<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0" />
    <title>Offline | Nayel Basket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #121212;
        --text: #ffffff;
        --accent: #D4AF37;
        --card: #1A1A1A;
        --muted: #A3A3A3;
      }
      
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --text: #121212;
          --accent: #D4AF37;
          --card: #f9f9f9;
          --muted: #666666;
        }
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        box-sizing: border-box;
        padding: 24px;
      }

      .container {
        max-width: 420px;
        background-color: var(--card);
        border: 1px solid rgba(212, 175, 55, 0.2);
        padding: 40px 32px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }

      .logo-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--accent);
        border-radius: 50%;
        animation: pulse 2s infinite ease-in-out;
      }

      .logo-icon svg {
        width: 40px;
        height: 40px;
        fill: var(--accent);
      }

      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 0 0 12px 0;
        color: var(--text);
      }

      p {
        font-size: 13px;
        line-height: 1.6;
        color: var(--muted);
        margin: 0 0 32px 0;
      }

      .retry-btn {
        background-color: var(--accent);
        color: #121212;
        border: none;
        padding: 14px 28px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
        box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
      }

      .retry-btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .retry-btn:active {
        transform: translateY(1px);
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4);
        }
        50% {
          transform: scale(1.03);
          box-shadow: 0 0 16px 4px rgba(212, 175, 55, 0.2);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <h1>Connection Offline</h1>
      <p>
        Your digital link to the Nayel Basket atelier is temporarily paused. Please check your network and reload to resume curating slow living coordinates.
      </p>
      <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
    </div>
  </body>
</html>
